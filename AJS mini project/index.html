<!DOCTYPE html>
<html ng-app="resumeApp">
<head>
    <meta charset="UTF-8">
    <title>Resume Builder SPA</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ngStorage/0.3.11/ngStorage.min.js"></script>

    <style>
        /* Practical I & II: CSS Box Model, Selectors, Layout */
        :root {
            --bg-color: #f4f7f9;
            --input-bg: #f0f4f8;
            --primary-blue: #0ea5e9;
            --border-color: #e2e8f0;
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-color); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Top Bar */
        .top-bar { display: flex; justify-content: center; padding: 10px; background: white; border-bottom: 1px solid var(--border-color); z-index: 10; }
        .tab-btn { padding: 6px 16px; border: 1px solid var(--border-color); background: white; cursor: pointer; color: var(--text-muted); }
        .tab-btn.active { border-color: var(--primary-blue); color: var(--primary-blue); font-weight: 500; border-radius: 4px; }

        /* Main Workspace Split */
        .workspace { display: flex; flex: 1; height: calc(100vh - 50px); }
        
        /* Left Panel - Form */
        .left-panel { flex: 1; max-width: 55%; background: white; overflow-y: auto; padding: 20px 40px; border-right: 1px solid var(--border-color); }
        
        /* Progress Bar */
        .score-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; margin-bottom: 20px; position: relative; }
        .score-bar::after { content: ''; position: absolute; left: 0; bottom: -2px; height: 2px; width: 20%; background-color: #ef4444; }
        .score-badge { background: #fee2e2; color: #ef4444; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .score-text { font-size: 14px; color: var(--text-muted); margin-left: 10px; }

        /* Form Grid */
        .section-title { font-size: 20px; color: var(--text-dark); margin-bottom: 5px; }
        .section-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        
        input[type="text"], input[type="email"], input[type="number"] {
            padding: 12px; background-color: var(--input-bg); border: 1px solid transparent; border-radius: 4px; font-size: 14px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--primary-blue); background-color: white; }

        /* Practical XXIII: Angular Validation Classes (Red for invalid, Green for valid) */
        input.ng-dirty.ng-invalid { border-color: #ef4444; background-color: #fee2e2; }
        input.ng-dirty.ng-valid { border-color: #22c55e; }
        .error-msg { color: #ef4444; font-size: 11px; margin-top: 4px; }

        /* Buttons */
        .btn-primary { background-color: var(--primary-blue); color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 14px; float: right; }
        .btn-link { color: var(--primary-blue); background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 500; text-align: left; padding: 10px 0; }

        /* Right Panel - Live Preview */
        .right-panel { flex: 1; background: var(--bg-color); display: flex; justify-content: center; align-items: flex-start; padding: 40px; overflow-y: auto; }
        .resume-paper { background: white; width: 100%; max-width: 600px; min-height: 800px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 50px; text-align: center; }
        
        .resume-header h1 { font-size: 24px; color: #111; margin-bottom: 5px; font-family: 'Times New Roman', serif; }
        .resume-contact { font-size: 13px; color: #444; margin-bottom: 20px; }

        /* Practical XI: Alternate Row Colors for Skills */
        .skills-list { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        .skills-list th, .skills-list td { padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        .even-row { background-color: #f8fafc; }

        /* Practical XXIX: Animations */
        .fade.ng-enter { transition: 0.5s linear all; opacity: 0; }
        .fade.ng-enter.ng-enter-active { opacity: 1; }
    </style>
</head>
<body ng-controller="ParentCtrl">

    <div class="top-bar">
        <button class="tab-btn active">Edit</button>
        <button class="tab-btn" ng-click="toggleJson()">Customize (Toggle JSON)</button>
    </div>

    <div ng-view class="fade workspace"></div>

    <script type="text/ng-template" id="home.html">
        <div class="left-panel" ng-controller="FormCtrl">
            
            <div class="score-bar">
                <div><span class="score-badge">20%</span><span class="score-text">Your resume score</span></div>
                <div style="font-size: 12px; color: #22c55e;">+5% Add email</div>
            </div>

            <div class="section-title">Personal Details</div>
            <div class="section-subtitle">Users who added phone number and email received 64% more positive feedback from recruiters.</div>

            <form name="resumeForm" novalidate>
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label>Job Target</label>
                        <input type="text" ng-model="profile.jobTarget" placeholder="e.g. Web Developer" ng-copy="showAlert('Job target copied!')">
                    </div>

                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" name="fName" ng-model="profile.firstName" required ng-keyup="logChange()">
                        <span class="error-msg" ng-show="resumeForm.fName.$dirty && resumeForm.fName.$invalid">First name is required.</span>
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" ng-model="profile.lastName">
                    </div>

                    <div class="input-group">
                        <label>Email*</label>
                        <input type="email" name="userEmail" ng-model="profile.email" required>
                        <span class="error-msg" ng-show="resumeForm.userEmail.$dirty && resumeForm.userEmail.$invalid">Enter a valid email address.</span>
                    </div>
                    <div class="input-group">
                        <label>Phone</label>
                        <input type="text" ng-model="profile.phone">
                    </div>

                    <div class="input-group full-width">
                        <label>Address</label>
                        <input type="text" ng-model="profile.address">
                    </div>

                    <div class="input-group">
                        <label>City, State</label>
                        <input type="text" ng-model="profile.city">
                    </div>
                    <div class="input-group">
                        <label>Expected Salary ($)</label>
                        <input type="number" ng-model="profile.salary">
                    </div>
                </div>

                <button type="button" class="btn-link" ng-click="showSkills = !showSkills">
                    {{ showSkills ? 'Hide skills section ʌ' : 'Add more details (Skills) v' }}
                </button>
                
                <div class="form-grid" ng-show="showSkills" style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px;">
                    <div class="input-group full-width" style="flex-direction: row; gap: 10px; align-items: flex-end;">
                        <div style="flex: 1;">
                            <label>Add Skill</label>
                            <input type="text" ng-model="newSkill" placeholder="e.g. AngularJS">
                        </div>
                        <button type="button" class="btn-primary" style="padding: 12px; float: none;" ng-click="addSkill()">Add</button>
                    </div>
                </div>

                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
                    <span style="font-size: 11px; color: #94a3b8;">{{ statusMessage }}</span>
                    <button type="button" class="btn-link" style="float:left; margin-right: 15px;" ng-click="fetchApiData()">Fetch Sample User</button>
                    <button type="button" class="btn-primary" ng-click="goToAbout()">Next: View Config & Routing</button>
                </div>
            </form>
        </div>

        <div class="right-panel" ng-controller="PreviewCtrl">
            <div class="resume-paper">
                
                <div ng-show="showJson" style="text-align: left; background: #333; color: #2de216; padding: 15px; font-family: monospace; font-size: 12px; margin-bottom: 20px;">
                    {{ profile | json }}
                </div>

                <div class="resume-header">
                    <h1>
                        {{ profile.firstName ? (profile.firstName | uppercase) : 'FIRST NAME' }} 
                        {{ profile.lastName ? (profile.lastName | uppercase) : 'LAST NAME' }}
                        <span ng-if="profile.jobTarget">, {{ profile.jobTarget | titleCase }}</span>
                    </h1>
                    
                    <div class="resume-contact">
                        <span ng-if="profile.email">{{ profile.email }}</span>
                        <span ng-if="profile.email && profile.phone"> | </span>
                        <span ng-if="profile.phone">{{ profile.phone }}</span>
                        <span ng-if="(profile.email || profile.phone) && profile.city"> | </span>
                        <span ng-if="profile.city">{{ profile.city }}</span>
                    </div>
                </div>

                <div style="text-align: center; margin-bottom: 20px;" ng-if="profile.salary">
                    <strong>Expected Salary:</strong> {{ profile.salary | currency:"$":0 }}
                </div>

                <div ng-if="profile.skills.length > 0" style="margin-top: 40px;">
                    <h3 style="text-align: left; border-bottom: 1px solid #ccc; padding-bottom: 5px;">
                        Skills 
                        <button style="font-size: 10px; cursor: pointer;" ng-click="sortOrder = (sortOrder === 'name' ? '-name' : 'name')">↕ Sort</button>
                    </h3>
                    <table class="skills-list">
                        <tr ng-repeat="skill in profile.skills | orderBy:sortOrder" ng-class-even="'even-row'">
                            <td>{{ skill.name | titleCase }}</td>
                            <td style="text-align: right;"><button ng-click="removeSkill($index)" style="color: red; border:none; background:none; cursor:pointer;">X</button></td>
                        </tr>
                    </table>
                </div>

                <div style="margin-top: 100px; display: inline-block; background: #111; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px;">
                    &lt; 1/1 &gt;
                </div>
            </div>
        </div>
    </script>

    <script type="text/ng-template" id="about.html">
        <div class="right-panel" style="flex: 1; width: 100%; align-items: center;">
            <div class="resume-paper" style="min-height: auto; padding: 40px;">
                <h2>Routing & Directives Demo</h2>
                <p style="margin: 20px 0;">Loaded via Parameter: <strong>{{ pageParam }}</strong></p>
                
                <p>Last Edit Time:</p>
                <current-time mode="element"></current-time>

                <br><br>
                <a href="#/!" style="color: var(--primary-blue); text-decoration: none; font-weight: bold;">&larr; Back to Editor</a>
            </div>
        </div>
    </script>

    <script>
        // Practical XV: Module initialization with routing, animation, and storage
        var app = angular.module('resumeApp', ['ngRoute', 'ngAnimate', 'ngStorage']);

        // Practical XXVI & XXVII: Routing configuration
        app.config(function($routeProvider) {
            $routeProvider
            .when('/', { templateUrl: 'home.html' })
            .when('/about/:source', { templateUrl: 'about.html', controller: 'AboutCtrl' })
            .otherwise({ redirectTo: '/' });
        });

        // Practical XX: Custom Filter (Title Case)
        app.filter('titleCase', function() {
            return function(input) {
                if (!input) return '';
                return input.replace(/\w\S*/g, function(txt){
                    return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
                });
            };
        });

        // Practical XII: Custom Directive (Element mode)
        app.directive('currentTime', function($filter) {
            return {
                restrict: 'E', 
                template: '<div style="background:#eee; padding:10px; display:inline-block; border-radius:4px;">{{ timeStr }}</div>',
                link: function(scope) {
                    // Practical XVII: Date filter ('medium' format)
                    scope.timeStr = $filter('date')(new Date(), 'medium');
                }
            };
        });

        // Practical XIV: Parent Controller (Shares Data)
        app.controller('ParentCtrl', function($scope, $localStorage, $http) {
            $scope.$storage = $localStorage.$default({
                userProfile: { jobTarget: '', firstName: '', lastName: '', email: '', phone: '', address: '', city: '', salary: null, skills: [] }
            });
            $scope.profile = $scope.$storage.userProfile;
            $scope.showJson = false;

            $scope.toggleJson = function() { $scope.showJson = !$scope.showJson; };

            // Practical XXVIII: API Fetching
            $scope.fetchApiData = function() {
                $http.get('https://jsonplaceholder.typicode.com/users/1').then(function(res) {
                    $scope.profile.firstName = res.data.name.split(' ')[0];
                    $scope.profile.lastName = res.data.name.split(' ')[1] || '';
                    $scope.profile.email = res.data.email;
                    $scope.profile.city = res.data.address.city;
                });
            };
        });

        // Practical XV: Form Child Controller
        app.controller('FormCtrl', function($scope, $location) {
            $scope.showSkills = false;
            $scope.newSkill = '';
            $scope.statusMessage = 'All changes saved locally.';

            // Practical IV: Arrays & Events
            $scope.addSkill = function() {
                if ($scope.newSkill) {
                    $scope.profile.skills.push({ name: $scope.newSkill });
                    $scope.newSkill = '';
                }
            };

            // Practical VIII: Events
            $scope.showAlert = function(msg) { alert(msg); };

            // Practical XXV: $apply example inside a standard JS timeout
            $scope.logChange = function() {
                $scope.statusMessage = 'Saving...';
                setTimeout(function() {
                    $scope.$apply(function() { $scope.statusMessage = 'All changes saved locally.'; });
                }, 1000);
            };

            $scope.goToAbout = function() {
                $location.path('/about/From_Editor_Button');
            };
        });

        // Preview Child Controller
        app.controller('PreviewCtrl', function($scope) {
            $scope.sortOrder = 'name'; // Default order
            $scope.removeSkill = function(index) {
                $scope.profile.skills.splice(index, 1);
            };
        });

        // About Route Controller
        app.controller('AboutCtrl', function($scope, $routeParams) {
            $scope.pageParam = $routeParams.source ? $routeParams.source.replace(/_/g, ' ') : 'Unknown';
        });
    </script>
</body>
</html>
